# Authoring-only Alembic config (COL-57).
#
# This file is used SOLELY for authoring/inspecting migrations from a repo
# checkout, e.g.:
#
#     alembic revision --autogenerate -m "add foo column"
#     alembic history
#     alembic upgrade head        # against the scratch DB below, for a sanity check
#
# The application NEVER reads this file at runtime. At runtime the Alembic
# Config is built in code from Settings by
# collapsarr.migrations.build_alembic_config (script_location = the packaged
# migrations dir, sqlalchemy.url = Settings.sqlalchemy_url).
#
# SQLite is the only supported and tested backend.

[alembic]
# Path to the migration environment, relative to this file (the repo root).
# Same directory the runtime Config points at, so authoring and runtime share
# one env.py + versions/ history.
script_location = collapsarr/migrations

# Date-prefixed revision filenames, e.g. 2026_07_24_ab12cd34ef56_add_foo.py.
# Revision *identity* stays the Alembic hash + down_revision chain; the date
# prefix is purely for human-friendly ordering in versions/.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Make `collapsarr` importable when running `alembic` from the repo root, so
# env.py can import Base.metadata and the model packages.
prepend_sys_path = .

# Throwaway scratch DB for authoring/autogenerate only — gitignored, never
# shipped. Delete it any time; `alembic upgrade head` recreates it.
sqlalchemy.url = sqlite:///./.alembic-scratch.db

[post_write_hooks]
# No post-write hooks configured (ruff/formatting is run separately).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
