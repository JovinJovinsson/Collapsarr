# Beta release track (UAT branch) — build & publish a testable image before
# anything is cut on main.
#
# Fires on every push to `uat`, then:
#   1. test-*  — same backend (pytest/ruff/mypy) + frontend (vitest/tsc/eslint)
#                gate as the tagged release pipeline (release.yml); any failure
#                stops the image from being published.
#   2. docker  — multi-arch (amd64+arm64) image build & push to Docker Hub,
#                tagged `beta` (rolling, always the latest uat push) and
#                `beta-<short-sha>` (immutable, for pinning a specific build).
#
# No PyPI publish and no GitHub Release here — those stay tied to a semver tag
# landing on main (release.yml). This track exists purely so a `beta` image can
# be pulled onto a test server ahead of that.
#
# Credentials: reuses the same Docker Hub secrets as release.yml
# (secrets.DOCKERHUB_USERNAME + secrets.DOCKERHUB_TOKEN).

name: beta

on:
  push:
    branches:
      - uat
  workflow_dispatch: {}

permissions:
  contents: read

env:
  IMAGE_NAME: odxnsson/collapsarr
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  test-backend:
    name: Backend tests (pytest / ruff / mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend with dev extras
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check collapsarr tests
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest

  test-frontend:
    name: Frontend tests (vitest / tsc / eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test

  docker:
    name: Build & push beta image
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:beta
            ${{ env.IMAGE_NAME }}:beta-${{ steps.meta.outputs.short_sha }}
          provenance: false
